; ESP32-C5 OTA co-processor firmware
; Pairs with OtaRequestModule on the nRF52 ProMicro Meshtastic node.
;
; The ESP32-C5B acts as:
;   - I2C slave (addr 0x42) — receives commands from nRF52
;   - WiFi STA               — downloads firmware files from the C5-A peer
;   - BLE central            — runs Nordic DFU to update the nRF52 bootloader

[env:esp32c5]
platform   = espressif32
board      = esp32-c5-devkitc-1
framework  = arduino

; NimBLE for BLE central + Nordic DFU; LittleFS bundled with esp32 core
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.3

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_BT_NIMBLE_ENABLED=1
    -D CONFIG_NIMBLE_ENABLED=1
    ; Larger MTU → faster DFU transfer (nRF52 bootloader supports up to 247)
    -D CONFIG_BT_NIMBLE_ATT_PREFERRED_MTU=512

monitor_speed  = 115200
monitor_filters = esp32_exception_decoder

; ---------------------------------------------------------------------------
; Dev / test boards (WiFi 2.4 GHz only — no 5 GHz, but fully functional)
; ---------------------------------------------------------------------------

; ESP32-C6 — recommended for testing (800 KB SRAM, WiFi 6, BLE 5)
[env:esp32c6]
platform   = espressif32
board      = esp32-c6-devkitc-1
framework  = arduino
lib_deps   = h2zero/NimBLE-Arduino @ ^1.4.3
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_BT_NIMBLE_ENABLED=1
    -D CONFIG_NIMBLE_ENABLED=1
    -D CONFIG_BT_NIMBLE_ATT_PREFERRED_MTU=512
    -D ARDUINO_USB_CDC_ON_BOOT=1
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

; ESP32-C3 — usable for testing but RAM is tight (400 KB SRAM)
; NimBLE + WiFi + LittleFS fit, but leave little headroom.
[env:esp32c3]
platform   = espressif32
board      = esp32-c3-devkitm-1
framework  = arduino
lib_deps   = h2zero/NimBLE-Arduino @ ^1.4.3
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_BT_NIMBLE_ENABLED=1
    -D CONFIG_NIMBLE_ENABLED=1
    -D CONFIG_BT_NIMBLE_ATT_PREFERRED_MTU=256    ; lower MTU to save RAM
    -D ARDUINO_USB_CDC_ON_BOOT=1
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
