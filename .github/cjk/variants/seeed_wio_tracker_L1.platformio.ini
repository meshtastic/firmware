[env:seeed_wio_tracker_L1]
custom_meshtastic_hw_model = 99
custom_meshtastic_hw_model_slug = SEEED_WIO_TRACKER_L1
custom_meshtastic_architecture = nrf52840
custom_meshtastic_actively_supported = true
custom_meshtastic_support_level = 1
custom_meshtastic_display_name = Seeed Wio Tracker L1 (CJK + JP IME)
custom_meshtastic_images = wio_tracker_l1_case.svg
custom_meshtastic_tags = Seeed
custom_meshtastic_requires_dfu = true

board = seeed_wio_tracker_L1
extends = nrf52840_base
board_level = extra
build_flags = ${nrf52840_base.build_flags}
  -I variants/nrf52840/seeed_wio_tracker_L1
  -D SEEED_WIO_TRACKER_L1
  -I src/platform/nrf52/softdevice
  -I src/platform/nrf52/softdevice/nrf52
  ; ----- CJK display layer (OLED_CJK=1 is set globally in root platformio.ini) -----
  ; Match gat562's OLED_CJK_SIZE=10 so a single generated font header serves both.
  -D OLED_CJK_SIZE=10
  -D OLEDDISPLAY_UTF8_TOP_PADDING=2
  ; ----- Japanese romaji-to-kana IME -----
  -D JP_IME=1
  ; ----- Flash exclusions to fit under 815104 bytes -----
  ; Wio L1 uses LR1110 — DO NOT exclude LR11x0.
  -D RADIOLIB_EXCLUDE_SX128X=1
  -D RADIOLIB_EXCLUDE_SX127X=1
  -D MESHTASTIC_EXCLUDE_RANGETEST=1
  -D MESHTASTIC_EXCLUDE_DETECTIONSENSOR=1
  -D MESHTASTIC_EXCLUDE_SERIAL=1
  -D MESHTASTIC_EXCLUDE_ATAK=1
  -D HAS_BBQ10_KEYBOARD=0
  -D HAS_MPR121_KEYBOARD=0
  -D HAS_TCA8418_KEYBOARD=0
board_build.ldscript = src/platform/nrf52/nrf52840_s140_v7.ld
build_src_filter = ${nrf52_base.build_src_filter} +<../variants/nrf52840/seeed_wio_tracker_L1>
debug_tool = jlink
