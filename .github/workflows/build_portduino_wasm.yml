name: Build PortDuino WASM

# Builds the ARCH_PORTDUINO_WASM target (the portduino node compiled to
# WebAssembly, src/platform/portduino/wasm/ + bin/build-portduino-wasm.sh) so it
# can't silently bit-rot. Software/CI only — asserts the full mesh stack +
# RadioLib + Crypto/XEdDSA compile and link to meshnode.{mjs,wasm}. It does NOT
# exercise the radio (that's CH341/WebUSB, hardware).

on:
  pull_request:
    paths:
      - "src/**"
      - "userPrefs.jsonc"
      - "variants/native/portduino.ini"
      - "bin/build-portduino-wasm.sh"
      - ".github/workflows/build_portduino_wasm.yml"
  push:
    branches: [master, develop]
    paths:
      - "src/**"
      - "userPrefs.jsonc"
      - "variants/native/portduino.ini"
      - "bin/build-portduino-wasm.sh"
      - ".github/workflows/build_portduino_wasm.yml"
  workflow_dispatch:

permissions: read-all

jobs:
  build-wasm:
    name: Build PortDuino WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # Checkout + Python + PlatformIO + native apt deps (libyaml-cpp, libusb, ...).
      - name: Setup native build
        uses: ./.github/actions/setup-native

      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      # Populate .pio/libdeps/native (RadioLib, Crypto with XEdDSA, Nanopb, ...) and
      # the portduino framework. The wasm build auto-detects this env (NATIVE_ENV).
      # On Linux the native link succeeds (no macOS/LovyanGFX issue).
      - name: Populate native libdeps
        run: platformio run -e native

      - name: Build PortDuino WASM
        run: bin/build-portduino-wasm.sh

      - name: Assert WASM artifacts
        run: |
          if [ ! -s build/wasm/meshnode.mjs ] || [ ! -s build/wasm/meshnode.wasm ]; then
            echo "::error::wasm artifacts missing"; tail -60 build/wasm-errors.log 2>/dev/null; exit 1
          fi
          ls -lah build/wasm/meshnode.*

      - name: Upload WASM artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: portduino-wasm
          overwrite: true
          path: |
            build/wasm/meshnode.mjs
            build/wasm/meshnode.wasm
          retention-days: 14

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: wasm-build-log
          path: build/wasm-errors.log
          retention-days: 7
