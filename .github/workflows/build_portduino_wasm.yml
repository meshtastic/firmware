name: Build PortDuino WASM

# Builds the [env:wasm] target (the portduino node compiled to WebAssembly,
# src/platform/portduino/wasm/) with `pio run -e wasm` so it can't silently
# bit-rot. Software/CI only — asserts the full mesh stack + RadioLib + Crypto
# compile and link to meshnode.{mjs,wasm} via the meshtastic/platform-wasm
# PlatformIO platform (emcc/Asyncify). It does NOT exercise the radio (that's
# CH341/WebUSB, hardware).

on:
  # [env:wasm] is not self-contained — it inherits build_flags/lib_deps/
  # extra_scripts from the root platformio.ini, which runs bin/platformio-*.py.
  # Trigger on those shared inputs too, or the rot-guard misses the changes most
  # likely to break the wasm build.
  pull_request:
    paths:
      - "src/**"
      - "userPrefs.jsonc"
      - "platformio.ini"
      - "variants/native/portduino/platformio.ini"
      - "variants/native/portduino.ini"
      - "extra_scripts/wasm_link_flags.py"
      - "bin/platformio-custom.py"
      - "bin/platformio-pre.py"
      - ".github/workflows/build_portduino_wasm.yml"
  push:
    branches: [master, develop]
    paths:
      - "src/**"
      - "userPrefs.jsonc"
      - "platformio.ini"
      - "variants/native/portduino/platformio.ini"
      - "variants/native/portduino.ini"
      - "extra_scripts/wasm_link_flags.py"
      - "bin/platformio-custom.py"
      - "bin/platformio-pre.py"
      - ".github/workflows/build_portduino_wasm.yml"
  workflow_dispatch:

permissions: read-all

jobs:
  build-wasm:
    name: Build PortDuino WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # Python + PlatformIO. (`pio run -e wasm` installs its own libdeps and the
      # platform-wasm/framework-portduino packages; it needs no native apt libs.)
      - name: Setup native build
        uses: ./.github/actions/setup-native

      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Build PortDuino WASM
        run: platformio run -e wasm

      - name: Assert WASM artifacts
        run: |
          OUT=.pio/build/wasm
          if [ ! -s "$OUT/meshnode.mjs" ] || [ ! -s "$OUT/meshnode.wasm" ]; then
            echo "::error::wasm artifacts missing"; exit 1
          fi
          # The emcc link succeeds even if embedded EM_ASM JS is malformed, so
          # parse the generated ES-module loader to catch runtime-JS breakage
          # (e.g. a formatter splitting !== inside EM_ASM).
          node --check "$OUT/meshnode.mjs" || { echo "::error::meshnode.mjs failed JS parse"; exit 1; }
          ls -lah "$OUT"/meshnode.*

      - name: Upload WASM artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: portduino-wasm
          overwrite: true
          path: |
            .pio/build/wasm/meshnode.mjs
            .pio/build/wasm/meshnode.wasm
          retention-days: 14
