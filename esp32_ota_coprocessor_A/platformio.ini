; ESP32 OTA Co-processor A — firmware uploader / file server
;
; Role: the "bridge" device.
;   - Creates a WiFi AP; user connects with phone and uploads the Nordic DFU .zip
;   - Extracts .dat + .bin from the zip using raw DEFLATE (zlib, no extra libs)
;   - Serves /firmware.dat and /firmware.bin over HTTP to co-processor B

[common]
lib_deps =
    mathieucarbou/ESPAsyncWebServer @ ^3.3.23
    mathieucarbou/AsyncTCP         @ ^3.3.6
build_flags_base =
    -D CORE_DEBUG_LEVEL=3
    -D ARDUINO_USB_CDC_ON_BOOT=1

; --- Production target ---
[env:esp32c5]
platform      = espressif32
board         = esp32-c5-devkitc-1
framework     = arduino
lib_deps      = ${common.lib_deps}
build_flags   = ${common.build_flags_base}
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; --- Dev / test boards ---
[env:esp32c6]
platform      = espressif32
board         = esp32-c6-devkitc-1
framework     = arduino
lib_deps      = ${common.lib_deps}
build_flags   = ${common.build_flags_base}
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

[env:esp32c3]
platform      = espressif32
board         = esp32-c3-devkitm-1
framework     = arduino
lib_deps      = ${common.lib_deps}
build_flags   = ${common.build_flags_base}
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
