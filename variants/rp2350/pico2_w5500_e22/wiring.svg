<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="monospace" font-size="12">
  <rect width="900" height="700" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#cdd6f4" font-size="16" font-weight="bold">Raspberry Pi Pico 2 — W5500 + E22-900M30S Wiring</text>
  <text x="450" y="50" text-anchor="middle" fill="#6c7086" font-size="11">env:pico2_w5500_e22  |  SPI0=Ethernet  SPI1=LoRa</text>

  <!-- ======== PICO 2 BOARD ======== -->
  <rect x="310" y="70" width="280" height="560" rx="10" fill="#313244" stroke="#585b70" stroke-width="1.5"/>
  <text x="450" y="92" text-anchor="middle" fill="#cdd6f4" font-size="13" font-weight="bold">Raspberry Pi Pico 2</text>
  <text x="450" y="108" text-anchor="middle" fill="#6c7086" font-size="10">RP2350 · 4 MB Flash</text>

  <!-- Left pins (odd: GP0..GP22 side) -->
  <!-- pin rows: y=130 step=18 -->
  <!-- Left side labels (inside board) -->
  <text x="380" y="143" text-anchor="end" fill="#a6e3a1" font-size="11">GP0</text>
  <text x="380" y="161" text-anchor="end" fill="#a6e3a1" font-size="11">GP1</text>
  <text x="380" y="179" text-anchor="end" fill="#f38ba8" font-size="11" font-weight="bold">GP2 BUSY</text>
  <text x="380" y="197" text-anchor="end" fill="#f38ba8" font-size="11" font-weight="bold">GP3 RXEN</text>
  <text x="380" y="215" text-anchor="end" fill="#a6e3a1" font-size="11">GP4 SDA</text>
  <text x="380" y="233" text-anchor="end" fill="#a6e3a1" font-size="11">GP5 SCL</text>
  <text x="380" y="251" text-anchor="end" fill="#a6e3a1" font-size="11">GP6 (BTN)</text>
  <text x="380" y="269" text-anchor="end" fill="#a6e3a1" font-size="11">GP7</text>
  <text x="380" y="287" text-anchor="end" fill="#a6e3a1" font-size="11">GP8</text>
  <text x="380" y="305" text-anchor="end" fill="#a6e3a1" font-size="11">GP9</text>
  <text x="380" y="323" text-anchor="end" fill="#f38ba8" font-size="11" font-weight="bold">GP10 SCK</text>
  <text x="380" y="341" text-anchor="end" fill="#f38ba8" font-size="11" font-weight="bold">GP11 MOSI</text>
  <text x="380" y="359" text-anchor="end" fill="#f38ba8" font-size="11" font-weight="bold">GP12 MISO</text>
  <text x="380" y="377" text-anchor="end" fill="#f38ba8" font-size="11" font-weight="bold">GP13 CS</text>
  <text x="380" y="395" text-anchor="end" fill="#f38ba8" font-size="11" font-weight="bold">GP14 IRQ</text>
  <text x="380" y="413" text-anchor="end" fill="#f38ba8" font-size="11" font-weight="bold">GP15 RST</text>
  <text x="380" y="431" text-anchor="end" fill="#89b4fa" font-size="11" font-weight="bold">GP16 MISO</text>
  <text x="380" y="449" text-anchor="end" fill="#89b4fa" font-size="11" font-weight="bold">GP17 CS</text>
  <text x="380" y="467" text-anchor="end" fill="#89b4fa" font-size="11" font-weight="bold">GP18 SCK</text>
  <text x="380" y="485" text-anchor="end" fill="#89b4fa" font-size="11" font-weight="bold">GP19 MOSI</text>
  <text x="380" y="503" text-anchor="end" fill="#89b4fa" font-size="11" font-weight="bold">GP20 RST</text>
  <text x="380" y="521" text-anchor="end" fill="#6c7086" font-size="11">GP21</text>
  <text x="380" y="539" text-anchor="end" fill="#6c7086" font-size="11">GP22</text>

  <!-- Right side labels (inside board) -->
  <text x="520" y="143" fill="#fab387" font-size="11">VBUS</text>
  <text x="520" y="161" fill="#fab387" font-size="11">VSYS</text>
  <text x="520" y="179" fill="#fab387" font-size="11">GND</text>
  <text x="520" y="197" fill="#fab387" font-size="11">3V3_EN</text>
  <text x="520" y="215" fill="#fab387" font-size="11">3V3</text>
  <text x="520" y="233" fill="#fab387" font-size="11">ADC_VREF</text>
  <text x="520" y="251" fill="#6c7086" font-size="11">GP28</text>
  <text x="520" y="269" fill="#a6e3a1" font-size="11">GP27 SCL</text>
  <text x="520" y="287" fill="#a6e3a1" font-size="11">GP26 SDA</text>
  <text x="520" y="305" fill="#fab387" font-size="11">RUN</text>
  <text x="520" y="323" fill="#6c7086" font-size="11">GP22</text>
  <text x="520" y="341" fill="#6c7086" font-size="11">GP21</text>
  <text x="520" y="359" fill="#6c7086" font-size="11">GP20 →</text>

  <!-- Left connector dots -->
  <g fill="#585b70">
    <circle cx="390" cy="140" r="4"/>
    <circle cx="390" cy="158" r="4"/>
    <circle cx="390" cy="176" r="4"/>
    <circle cx="390" cy="194" r="4"/>
    <circle cx="390" cy="212" r="4"/>
    <circle cx="390" cy="230" r="4"/>
    <circle cx="390" cy="248" r="4"/>
    <circle cx="390" cy="266" r="4"/>
    <circle cx="390" cy="284" r="4"/>
    <circle cx="390" cy="302" r="4"/>
    <circle cx="390" cy="320" r="4"/>
    <circle cx="390" cy="338" r="4"/>
    <circle cx="390" cy="356" r="4"/>
    <circle cx="390" cy="374" r="4"/>
    <circle cx="390" cy="392" r="4"/>
    <circle cx="390" cy="410" r="4"/>
    <circle cx="390" cy="428" r="4"/>
    <circle cx="390" cy="446" r="4"/>
    <circle cx="390" cy="464" r="4"/>
    <circle cx="390" cy="482" r="4"/>
    <circle cx="390" cy="500" r="4"/>
    <circle cx="390" cy="518" r="4"/>
    <circle cx="390" cy="536" r="4"/>
  </g>

  <!-- Right connector dots -->
  <g fill="#585b70">
    <circle cx="510" cy="140" r="4"/>
    <circle cx="510" cy="158" r="4"/>
    <circle cx="510" cy="176" r="4"/>
    <circle cx="510" cy="194" r="4"/>
    <circle cx="510" cy="212" r="4"/>
    <circle cx="510" cy="230" r="4"/>
    <circle cx="510" cy="248" r="4"/>
    <circle cx="510" cy="266" r="4"/>
    <circle cx="510" cy="284" r="4"/>
    <circle cx="510" cy="302" r="4"/>
  </g>

  <!-- ======== E22-900M30S MODULE (right side) ======== -->
  <rect x="660" y="120" width="180" height="260" rx="8" fill="#2d2d3f" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="750" y="142" text-anchor="middle" fill="#f38ba8" font-size="12" font-weight="bold">E22-900M30S</text>
  <text x="750" y="157" text-anchor="middle" fill="#6c7086" font-size="10">EBYTE SX1262 LoRa</text>

  <!-- E22 pins (left side of module = connects to Pico) -->
  <text x="672" y="182" fill="#cdd6f4" font-size="10">GND</text>
  <text x="672" y="200" fill="#cdd6f4" font-size="10">VCC  3.3V</text>
  <text x="672" y="218" fill="#f38ba8" font-size="10" font-weight="bold">RXEN</text>
  <text x="672" y="236" fill="#f38ba8" font-size="10" font-weight="bold">TXEN</text>
  <text x="672" y="254" fill="#f38ba8" font-size="10" font-weight="bold">DIO2</text>
  <text x="672" y="272" fill="#f38ba8" font-size="10" font-weight="bold">DIO1</text>
  <text x="672" y="290" fill="#f38ba8" font-size="10" font-weight="bold">BUSY</text>
  <text x="672" y="308" fill="#f38ba8" font-size="10" font-weight="bold">NSS/CS</text>
  <text x="672" y="326" fill="#f38ba8" font-size="10" font-weight="bold">SCK</text>
  <text x="672" y="344" fill="#f38ba8" font-size="10" font-weight="bold">MOSI</text>
  <text x="672" y="362" fill="#f38ba8" font-size="10" font-weight="bold">MISO</text>
  <text x="672" y="380" fill="#f38ba8" font-size="10" font-weight="bold">NRST</text>

  <!-- E22 connector dots -->
  <g fill="#f38ba8">
    <circle cx="666" cy="179" r="3.5"/>
    <circle cx="666" cy="197" r="3.5"/>
    <circle cx="666" cy="215" r="3.5"/>
    <circle cx="666" cy="233" r="3.5"/>
    <circle cx="666" cy="251" r="3.5"/>
    <circle cx="666" cy="269" r="3.5"/>
    <circle cx="666" cy="287" r="3.5"/>
    <circle cx="666" cy="305" r="3.5"/>
    <circle cx="666" cy="323" r="3.5"/>
    <circle cx="666" cy="341" r="3.5"/>
    <circle cx="666" cy="359" r="3.5"/>
    <circle cx="666" cy="377" r="3.5"/>
  </g>

  <!-- DIO2→TXEN bridge label -->
  <rect x="690" y="226" width="110" height="16" rx="3" fill="#45475a" stroke="#f38ba8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="745" y="237" text-anchor="middle" fill="#f9e2af" font-size="9" font-weight="bold">⚠ bridge DIO2→TXEN</text>

  <!-- ======== W5500 MODULE (right side lower) ======== -->
  <rect x="660" y="410" width="180" height="210" rx="8" fill="#2d2d3f" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="750" y="432" text-anchor="middle" fill="#89b4fa" font-size="12" font-weight="bold">W5500 module</text>
  <text x="750" y="447" text-anchor="middle" fill="#6c7086" font-size="10">SPI0 Ethernet</text>

  <!-- W5500 pins -->
  <text x="672" y="470" fill="#cdd6f4" font-size="10">GND</text>
  <text x="672" y="488" fill="#cdd6f4" font-size="10">3.3V</text>
  <text x="672" y="506" fill="#89b4fa" font-size="10" font-weight="bold">MISO</text>
  <text x="672" y="524" fill="#89b4fa" font-size="10" font-weight="bold">MOSI</text>
  <text x="672" y="542" fill="#89b4fa" font-size="10" font-weight="bold">SCLK</text>
  <text x="672" y="560" fill="#89b4fa" font-size="10" font-weight="bold">SCS/CS</text>
  <text x="672" y="578" fill="#89b4fa" font-size="10" font-weight="bold">RST</text>
  <text x="672" y="596" fill="#6c7086" font-size="10">INT (nc)</text>

  <!-- W5500 connector dots -->
  <g fill="#89b4fa">
    <circle cx="666" cy="467" r="3.5"/>
    <circle cx="666" cy="485" r="3.5"/>
    <circle cx="666" cy="503" r="3.5"/>
    <circle cx="666" cy="521" r="3.5"/>
    <circle cx="666" cy="539" r="3.5"/>
    <circle cx="666" cy="557" r="3.5"/>
    <circle cx="666" cy="575" r="3.5"/>
    <circle cx="666" cy="593" r="3.5"/>
  </g>

  <!-- ======== WIRES: Pico → E22 (LoRa, red/pink) ======== -->
  <!-- GP2 BUSY → E22 BUSY -->
  <polyline points="390,176 610,176 610,287 666,287" fill="none" stroke="#f38ba8" stroke-width="1.5"/>
  <!-- GP3 RXEN → E22 RXEN -->
  <polyline points="390,194 620,194 620,215 666,215" fill="none" stroke="#f38ba8" stroke-width="1.5"/>
  <!-- GP10 SCK → E22 SCK -->
  <polyline points="390,320 630,320 630,323 666,323" fill="none" stroke="#f38ba8" stroke-width="1.5"/>
  <!-- GP11 MOSI → E22 MOSI -->
  <polyline points="390,338 635,338 635,341 666,341" fill="none" stroke="#f38ba8" stroke-width="1.5"/>
  <!-- GP12 MISO → E22 MISO -->
  <polyline points="390,356 640,356 640,359 666,359" fill="none" stroke="#f38ba8" stroke-width="1.5"/>
  <!-- GP13 CS → E22 NSS -->
  <polyline points="390,374 645,374 645,305 666,305" fill="none" stroke="#f38ba8" stroke-width="1.5"/>
  <!-- GP14 IRQ → E22 DIO1 -->
  <polyline points="390,392 650,392 650,269 666,269" fill="none" stroke="#f38ba8" stroke-width="1.5"/>
  <!-- GP15 RST → E22 NRST -->
  <polyline points="390,410 655,410 655,377 666,377" fill="none" stroke="#f38ba8" stroke-width="1.5"/>

  <!-- ======== WIRES: Pico → W5500 (blue) ======== -->
  <!-- GP16 MISO → W5500 MISO -->
  <polyline points="390,428 600,428 600,503 666,503" fill="none" stroke="#89b4fa" stroke-width="1.5"/>
  <!-- GP17 CS → W5500 SCS -->
  <polyline points="390,446 595,446 595,557 666,557" fill="none" stroke="#89b4fa" stroke-width="1.5"/>
  <!-- GP18 SCK → W5500 SCLK -->
  <polyline points="390,464 590,464 590,539 666,539" fill="none" stroke="#89b4fa" stroke-width="1.5"/>
  <!-- GP19 MOSI → W5500 MOSI -->
  <polyline points="390,482 585,482 585,521 666,521" fill="none" stroke="#89b4fa" stroke-width="1.5"/>
  <!-- GP20 RST → W5500 RST -->
  <polyline points="390,500 580,500 580,575 666,575" fill="none" stroke="#89b4fa" stroke-width="1.5"/>

  <!-- ======== LEGEND ======== -->
  <rect x="20" y="120" width="275" height="185" rx="6" fill="#313244" stroke="#585b70" stroke-width="1"/>
  <text x="157" y="140" text-anchor="middle" fill="#cdd6f4" font-size="12" font-weight="bold">Conexiones</text>

  <!-- LoRa group -->
  <rect x="30" y="148" width="8" height="8" fill="#f38ba8"/>
  <text x="45" y="157" fill="#f38ba8" font-size="11" font-weight="bold">SPI1 — LoRa (E22-900M30S)</text>
  <text x="35" y="172" fill="#cdd6f4" font-size="10">GP2  → BUSY     GP10 → SCK</text>
  <text x="35" y="186" fill="#cdd6f4" font-size="10">GP3  → RXEN    GP11 → MOSI</text>
  <text x="35" y="200" fill="#cdd6f4" font-size="10">GP13 → CS       GP12 → MISO</text>
  <text x="35" y="214" fill="#cdd6f4" font-size="10">GP14 → DIO1     GP15 → RST</text>

  <!-- Ethernet group -->
  <rect x="30" y="226" width="8" height="8" fill="#89b4fa"/>
  <text x="45" y="235" fill="#89b4fa" font-size="11" font-weight="bold">SPI0 — Ethernet (W5500)</text>
  <text x="35" y="250" fill="#cdd6f4" font-size="10">GP16 → MISO    GP18 → SCK</text>
  <text x="35" y="264" fill="#cdd6f4" font-size="10">GP17 → CS       GP19 → MOSI</text>
  <text x="35" y="278" fill="#cdd6f4" font-size="10">GP20 → RST</text>
  <text x="35" y="295" fill="#f9e2af" font-size="10">⚠ Bridge DIO2→TXEN en módulo E22</text>

  <!-- Power note -->
  <rect x="20" y="320" width="275" height="80" rx="6" fill="#313244" stroke="#585b70" stroke-width="1"/>
  <text x="157" y="338" text-anchor="middle" fill="#cdd6f4" font-size="12" font-weight="bold">Alimentación</text>
  <text x="30" y="355" fill="#fab387" font-size="10">Pico 2 VBUS  →  USB 5V</text>
  <text x="30" y="370" fill="#fab387" font-size="10">Pico 2 3V3   →  VCC E22 + VCC W5500</text>
  <text x="30" y="385" fill="#fab387" font-size="10">GND común entre los 3 módulos</text>
  <text x="30" y="392" fill="#6c7086" font-size="9">E22 consume hasta 1 A en TX — usar cap 100µF</text>

  <!-- Build note -->
  <rect x="20" y="415" width="275" height="50" rx="6" fill="#313244" stroke="#585b70" stroke-width="1"/>
  <text x="30" y="433" fill="#a6e3a1" font-size="11" font-weight="bold">Build:</text>
  <text x="30" y="450" fill="#cdd6f4" font-size="10">pio run -e pico2_w5500_e22</text>

  <!-- Board flash note -->
  <rect x="20" y="480" width="275" height="35" rx="6" fill="#313244" stroke="#585b70" stroke-width="1"/>
  <text x="30" y="497" fill="#cdd6f4" font-size="10">board = rpipico2  →  4 MB flash</text>
  <text x="30" y="511" fill="#6c7086" font-size="9">(W5500-EVB-Pico2 solo tiene 2 MB)</text>

</svg>
