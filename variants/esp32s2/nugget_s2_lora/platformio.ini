[env:nugget-s2-lora]
extends = esp32s2_base
board = lolin_s2_mini
board_level = extra
board_check = true
board_build.extra_flags =
  -DARDUINO_LOLIN_S2_MINI
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DARDUINO_USB_MODE=0
build_flags =
  ${esp32s2_base.build_flags}
  -D PRIVATE_HW
  -I variants/esp32s2/nugget_s2_lora
