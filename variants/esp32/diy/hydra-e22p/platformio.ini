; Hydra E22P - Enables support for the Ebyte E22P-868M30S and E22P-915M30S modules.
; WARNING: Do not flash this variant on a standard E22 module, as it will result in hardware damage!
[env:hydra]
custom_meshtastic_hw_model = 39
custom_meshtastic_hw_model_slug = HYDRA
custom_meshtastic_architecture = esp32
custom_meshtastic_actively_supported = true
custom_meshtastic_support_level = 3
custom_meshtastic_display_name = Hydra
custom_meshtastic_tags = DIY

extends = esp32_base
board = esp32doit-devkit-v1
build_flags =
  ${esp32_base.build_flags}
  -D DIY_V1
  -DBOARD_HAS_PSRAM
  -I variants/esp32/diy/hydra-e22p
  -ULED_BUILTIN
