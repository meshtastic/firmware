; RAK4631 + RAK5811 measuring a Voltaic V25 USB power bank on A8.
; This variant keeps the stock RAK4631 pin map and radio/display support, but
; treats the Voltaic pack as the node battery instead of USB mains power.
[env:rak4631_voltaic_v25]
extends = env:rak4631
board_level = extra
build_flags =
  ${env:rak4631.build_flags}
  -I variants/nrf52840/rak4631_voltaic_v25
  -D VOLTAIC_V25_RAK5811_BATTERY=1
  -D VOLTAIC_V25_RAK5811_POWER_PIN=17
  -D VOLTAIC_V25_RAK5811_BATTERY_PIN=31
  -D VOLTAIC_V25_RAK5811_DIVIDER_RATIO=0.6
  -D VOLTAIC_V25_PACK_DIVIDER_RATIO=0.5
  -D VOLTAIC_V25_SOC_0_MV=2960
  -D VOLTAIC_V25_SOC_25_MV=3296
  -D VOLTAIC_V25_SOC_50_MV=3498
  -D VOLTAIC_V25_SOC_75_MV=3699
  -D VOLTAIC_V25_SOC_100_MV=3883
  -D VOLTAIC_V25_RAK5811_SETTLE_MS=100
  -D VOLTAIC_V25_RAK5811_KEEP_POWER_ON=1
  -D VOLTAIC_V25_FORCE_BATTERY_POWER=1
build_src_filter = ${nrf52_base.build_src_filter} +<../variants/nrf52840/rak4631_voltaic_v25> +<mesh/eth/> +<mesh/api/> +<mqtt/>
