[env:pca10059_diy_eink]
board_level = extra
extends = nrf52840_base, niche
board = nordic_pca10059
build_flags = ${nrf52840_base.build_flags}
  ${niche.build_flags}
  -Ivariants/nrf52840/Dongle_nRF52840-pca10059-v1
  -D NORDIC_PCA10059
build_src_filter = ${nrf52_base.build_src_filter} ${niche.build_src_filter} +<../variants/nrf52840/Dongle_nRF52840-pca10059-v1>
lib_deps =
  ${nrf52840_base.lib_deps}
debug_tool = jlink
