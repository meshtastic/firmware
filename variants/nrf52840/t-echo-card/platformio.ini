[env:t-echo-card]
extends = nrf52840_base
board = t-echo
board_level = extra
debug_tool = jlink

# NOTE: the 72x40 OLED on this board depends on GEOMETRY_72_40 and
# SSD1306Wire::setYOffset(), which are not yet in the pinned
# meshtastic/esp8266-oled-ssd1306 commit. Apply the unified diff at
#   variants/nrf52840/t-echo-card/oled_72x40_viewport.patch
# to .pio/libdeps/<env>/ESP8266\ and\ ESP32\ OLED\ driver\ for\ SSD1306\ displays/
# before building, or bump the lib_deps pin in the root platformio.ini to a
# fork that already contains the patch.

build_flags = ${nrf52840_base.build_flags}
  -I variants/nrf52840/t-echo-card
  -D PRIVATE_HW
  -D T_ECHO_CARD

build_src_filter = ${nrf52_base.build_src_filter} +<../variants/nrf52840/t-echo-card>
