; DeltaPlusProto Edict - nRF52840 + SX1262 + SKY66122 PA
[env:edict]
custom_meshtastic_hw_model = 255
custom_meshtastic_hw_model_slug = edict
custom_meshtastic_architecture = nrf52840
custom_meshtastic_actively_supported = true
custom_meshtastic_support_level = 1
custom_meshtastic_display_name = Edict
custom_meshtastic_tags = DeltaPlusProto
custom_meshtastic_requires_dfu = true

extends = nrf52840_base
board = edict
board_check = true
build_flags = ${nrf52840_base.build_flags}
  -Ivariants/nrf52840/edict
  -D EDICT
  -D MESHTASTIC_EXCLUDE_SERIAL=1
  -DRADIOLIB_EXCLUDE_SX128X=1
  -DRADIOLIB_EXCLUDE_SX127X=1
  -DRADIOLIB_EXCLUDE_LR11X0=1
build_src_filter = ${nrf52_base.build_src_filter} +<../variants/nrf52840/edict> +<mesh/api/>
lib_deps =
  ${nrf52840_base.lib_deps}
  ${networking_base.lib_deps}
