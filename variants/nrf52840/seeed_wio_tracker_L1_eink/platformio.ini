[env:seeed_wio_tracker_L1_eink]
custom_meshtastic_hw_model = 100
custom_meshtastic_hw_model_slug = SEEED_WIO_TRACKER_L1_EINK
custom_meshtastic_architecture = nrf52840
custom_meshtastic_actively_supported = true
custom_meshtastic_support_level = 1
custom_meshtastic_display_name = Seeed Wio Tracker L1 E-Ink
custom_meshtastic_images = wio_tracker_l1_eink.svg
custom_meshtastic_tags = Seeed
custom_meshtastic_has_ink_hud = true

board = seeed_wio_tracker_L1
extends = nrf52840_base, niche
;board_level = extra
build_flags = ${nrf52840_base.build_flags}
  ${niche.build_flags}
  -I variants/nrf52840/seeed_wio_tracker_L1_eink
  -D SEEED_WIO_TRACKER_L1_EINK
  -D SEEED_WIO_TRACKER_L1
  -I src/platform/nrf52/softdevice
  -I src/platform/nrf52/softdevice/nrf52
  -DUSE_EINK
board_build.ldscript = src/platform/nrf52/nrf52840_s140_v7.ld
build_src_filter = ${nrf52_base.build_src_filter} ${niche.build_src_filter} +<../variants/nrf52840/seeed_wio_tracker_L1_eink>
lib_deps =
  ${nrf52840_base.lib_deps}
debug_tool = jlink

[env:seeed_wio_tracker_L1_eink-inkhud]
board = seeed_wio_tracker_L1
extends = nrf52840_base, inkhud
build_flags =
  ${nrf52840_base.build_flags}
  ${inkhud.build_flags}
  -I variants/nrf52840/seeed_wio_tracker_L1_eink
  -D SEEED_WIO_TRACKER_L1
  -D BUTTON_PIN=D13
board_build.ldscript = src/platform/nrf52/nrf52840_s140_v7.ld
build_src_filter =
  ${nrf52_base.build_src_filter}
  ${inkhud.build_src_filter}
  +<../variants/nrf52840/seeed_wio_tracker_L1_eink>
lib_deps =
  ${inkhud.lib_deps} ; Before base libs_deps, so we use ZinggJM/GFXRoot instead of AdafruitGFX (saves space)
  ${nrf52840_base.lib_deps}
debug_tool = jlink
