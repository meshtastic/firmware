; =============================================================================
; Touch_LCD_2_SX1262_L76K ESP32-S3 Board Configuration
; =============================================================================
; Hardware specifications:
; - MCU: ESP32-S3
; - Display: 2-inch 240x320 ST7789 TFT LCD
; - Touch: CST816D capacitive touch controller
; - LoRa: SX1262 RF chip
; - GPS: L76K module, supports GPS and BeiDou positioning
; =============================================================================

; ==== Build Environment ====
[env:touch_lcd_2_sx1262_l76k]
extends = esp32s3_base                              ; Inherit from the esp32s3_base parent environment
board = touch_lcd_2_sx1262_l76k                     ; Custom board (requires a JSON definition file in boards/)
board_build.partitions = default_16MB.csv           ; Partition table file (16MB Flash)
; board_check = true                                ; Validates the board field before building; errors if invalid

; ==== Debug Configuration ====
; debug_port = COM4                                 ; Serial port (auto-selected if omitted)
; debug_tool = esp-builtin                          ; Use built-in USB-JTAG

; ==== Upload Configuration ====
; upload_protocol = esp-builtin                     ; Use built-in USB-JTAG
upload_protocol = esptool                           ; Use esptool instead of esp-builtin to avoid toolchain issues
upload_speed = 921600                               ; Upload baud rate

; ==== Serial Monitor Configuration ====
; monitor_port = COM4                               ; Serial port (auto-selected if omitted)
monitor_speed = 115200                              ; Monitor baud rate
monitor_filters = esp32_exception_decoder           ; Decodes ESP32 crash stack traces (memory errors, assertions, watchdog, etc.)

; ==== Build Configuration ====
build_unflags = -flto                               ; Disable LTO optimization to avoid linker issues
; build_type = debug                                ; Build mode: debug / release
build_flags =                                       ; Extra compiler options and macro definitions
    ${esp32s3_base.build_flags}                     ; Inherit base build flags from esp32s3_base
    ; ==== Hardware Definitions ====
    -D TOUCH_LCD_2_SX1262_L76K                      ; Define TOUCH_LCD_2_SX1262_L76K macro
    -D PRIVATE_HW                                   ; Mark project as using private/custom hardware
    -I variants/esp32s3/Touch_LCD_2_SX1262_L76K     ; Add include path for custom hardware configuration
    ; ==== Logging Definitions ====
    ; -D ARDUINO_USB_MODE=0                           ; Enable USB mode
    ; -D ARDUINO_USB_CDC_ON_BOOT=0                    ; Auto-initialize USB CDC on boot
    ; -D CONFIG_ARDUHAL_LOG_COLORS=1                  ; Enable log colors (causes build failure, do not enable)
    ; ==== C++ Features ====
    -faligned-new                                   ; Enable C++17 aligned new support (SX1262Interface requires 16-byte alignment)
                                                    ; Note: This flag produces warnings when compiling C files (C++ only); this is normal and does not affect compilation
    ; ==== Compiler Optimizations ====
    ; -Og                                           ; Enable debug optimization (keep -Og together, do not split)
    ; -ggdb3                                        ; Generate GDB debug info (keep -ggdb3 together, do not split)
    -fno-strict-aliasing                            ; Suppress type-aliasing warnings
    ; ==== Warning Suppression (third-party libraries) ====
    -Wno-odr                                        ; Suppress One Definition Rule warnings
    -Wno-lto-type-mismatch                          ; Suppress LTO type mismatch warnings
    -Wno-format                                     ; Suppress format warnings
    -Wno-unused-variable                            ; Suppress unused variable warnings (third-party libraries)
    -Wno-parentheses                                ; Suppress parentheses suggestion warnings (third-party libraries)
    -Wno-type-limits                                ; Suppress type limit warnings (third-party libraries)
    -Wno-implicit-fallthrough                       ; Suppress switch case fall-through warnings
    -Wno-deprecated-declarations                    ; Suppress deprecated API warnings (LovyanGFX)
    -Wno-ignored-qualifiers                         ; Suppress ignored type qualifier warnings (aes-ccm)
    -Wno-array-bounds                               ; Suppress array out-of-bounds warnings (DFRobot_RTU flexible array members)
    ; ==== Notes ====
    ; 1. Macro redefinition warnings for NO_DATA, I2C_BUFFER_LENGTH etc. come from third-party library conflicts and cannot be suppressed via flags; they are safe to ignore.
    ; 2. -faligned-new produces warnings when compiling C files (C++ only); this is normal and does not affect compilation.

; ==== Library Dependencies ====
lib_deps =
    ${esp32s3_base.lib_deps}                        ; Inherit base library dependencies from esp32s3_base
    lovyan03/LovyanGFX@1.2.0                        ; LovyanGFX graphics library (pin to this version; newer versions cause build errors)
