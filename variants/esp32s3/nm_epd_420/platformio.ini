; RockBase IoT NM-EPD-420 -- ESP32-S3 + 4.2" 400x300 tri-color EPD + SX1262 LoRa
;
; Three flavours:
;   nm-epd-420         -- classic Meshtastic EInk UI via GxEPD2 (single tile, B&W only)
;   nm-epd-420-inkhud  -- InkHUD applet framework (multi-page, weather/sensor friendly)
;
; The board ships with no upstream Meshtastic HardwareModel ID assigned, so we use
; PRIVATE_HW (255). Set custom_meshtastic_hw_model to a proper enum value once a
; meshtastic.proto entry has been merged upstream.

[env:nm-epd-420]
custom_meshtastic_hw_model = 255
custom_meshtastic_hw_model_slug = PRIVATE_HW
custom_meshtastic_architecture = esp32-s3
custom_meshtastic_actively_supported = true
custom_meshtastic_support_level = 2
custom_meshtastic_display_name = RockBase IoT NM-EPD-420
custom_meshtastic_tags = RockBase IoT
custom_meshtastic_requires_dfu = true
custom_meshtastic_partition_scheme = 16MB

extends = esp32s3_base
board = nm_epd_420
board_build.partitions = default_16MB.csv
build_flags =
  ${esp32s3_base.build_flags}
  -I variants/esp32s3/nm_epd_420
  -D NM_EPD_420
  -D BUTTON_CLICK_MS=200
  -D EINK_DISPLAY_MODEL=GxEPD2_420_GYE042A87
  -D EINK_WIDTH=400
  -D EINK_HEIGHT=300
  -D USE_EINK
  -D USE_EINK_DYNAMICDISPLAY
  -D EINK_LIMIT_FASTREFRESH=10
  -D EINK_HASQUIRK_GHOSTING
  -D ENVIRONMENTAL_TELEMETRY_MODULE_ENABLE=1
  -D ENVIRONMENTAL_TELEMETRY_SCREEN_ENABLE=1
  -D USERPREFS_CONFIG_ENVIRONMENT_MEASUREMENT_ENABLED=1
  -D USERPREFS_CONFIG_ENV_TELEM_UPDATE_INTERVAL=300
lib_deps =
  ${esp32s3_base.lib_deps}
  # renovate: datasource=git-refs depName=meshtastic-GxEPD2 packageName=https://github.com/meshtastic/GxEPD2 gitBranch=master
  https://github.com/meshtastic/GxEPD2/archive/c7eb4c3c167cf396ef4f541cc5d4c6aa42f3c46b.zip
upload_speed = 921600

[env:nm-epd-420-inkhud]
custom_meshtastic_hw_model = 255
custom_meshtastic_hw_model_slug = PRIVATE_HW
custom_meshtastic_architecture = esp32-s3
custom_meshtastic_actively_supported = true
custom_meshtastic_support_level = 2
custom_meshtastic_display_name = RockBase IoT NM-EPD-420 (InkHUD)
custom_meshtastic_tags = RockBase IoT
custom_meshtastic_requires_dfu = true
custom_meshtastic_partition_scheme = 16MB
custom_meshtastic_has_ink_hud = true

extends = esp32s3_base, inkhud
board = nm_epd_420
board_build.partitions = default_16MB.csv
build_src_filter =
  ${esp32s3_base.build_src_filter}
  ${inkhud.build_src_filter}
build_flags =
  ${esp32s3_base.build_flags}
  ${inkhud.build_flags}
  -I variants/esp32s3/nm_epd_420
  -D NM_EPD_420
  -D BUTTON_CLICK_MS=200
  -D ENVIRONMENTAL_TELEMETRY_MODULE_ENABLE=1
  -D ENVIRONMENTAL_TELEMETRY_SCREEN_ENABLE=1
  -D USERPREFS_CONFIG_ENVIRONMENT_MEASUREMENT_ENABLED=1
  -D USERPREFS_CONFIG_ENV_TELEM_UPDATE_INTERVAL=300
lib_deps =
  ${inkhud.lib_deps} ; InkHUD libs first, so we get GFXRoot instead of AdafruitGFX
  ${esp32s3_base.lib_deps}
upload_speed = 921600
