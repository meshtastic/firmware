[env:heltec-wireless-paper]
custom_meshtastic_hw_model = 49
custom_meshtastic_hw_model_slug = HELTEC_WIRELESS_PAPER
custom_meshtastic_architecture = esp32-s3
custom_meshtastic_actively_supported = true
custom_meshtastic_support_level = 1
custom_meshtastic_display_name = Heltec Wireless Paper
custom_meshtastic_images = heltec-wireless-paper.svg
custom_meshtastic_tags = Heltec
custom_meshtastic_partition_scheme = 8MB
custom_meshtastic_has_ink_hud = true

extends = esp32s3_base, niche
board = heltec_wifi_lora_32_V3
board_build.partitions = default_8MB.csv
build_src_filter =
  ${esp32s3_base.build_src_filter}
  ${niche.build_src_filter}
build_flags =
  ${esp32s3_base.build_flags}
  ${niche.build_flags}
  -I variants/esp32s3/heltec_wireless_paper
  -D HELTEC_WIRELESS_PAPER
  -D USE_EINK
lib_deps =
  ${esp32s3_base.lib_deps}
upload_speed = 115200

[env:heltec-wireless-paper-inkhud]
extends = esp32s3_base, inkhud
board = heltec_wifi_lora_32_V3
board_build.partitions = default_8MB.csv
build_src_filter =
  ${esp32s3_base.build_src_filter}
  ${inkhud.build_src_filter}
build_flags =
  ${esp32s3_base.build_flags}
  ${inkhud.build_flags}
  -I variants/esp32s3/heltec_wireless_paper
  -D HELTEC_WIRELESS_PAPER
lib_deps =
  ${inkhud.lib_deps} ; InkHUD libs first, so we get GFXRoot instead of AdafruitGFX
  ${esp32s3_base.lib_deps}
upload_speed = 921600
